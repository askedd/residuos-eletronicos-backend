# ============================================================
#  Configuração do Banco de Dados SQLite
# ============================================================
spring.datasource.url=jdbc:sqlite:residuos_eletronicos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Dialeto do Hibernate para SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Cria/atualiza as tabelas automaticamente ao iniciar
spring.jpa.hibernate.ddl-auto=update

# Mostra SQL no console (útil durante desenvolvimento)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
#  Configuração do Servidor
# ============================================================
server.port=8080

# ============================================================
#  Nome da aplicação
# ============================================================
spring.application.name=residuos-eletronicos
